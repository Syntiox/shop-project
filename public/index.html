<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Shop - Best Deals</title>
    <link rel="stylesheet" href="main.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>

    <header>
        <div class="navbar">
            <div class="logo">MY STORE</div>

            <div class="search-bar">
            <input type="text" id="mainSearchInput" placeholder="Search in Store...">
            <button onclick="mainSearch()"><i class="fas fa-search"></i></button>
            </div>

            <div class="cart-icon" onclick="window.location.href='cart.html'">
              <i class="fas fa-shopping-cart"></i>
              <span id="cart-count" style="background:red; color:white; border-radius:50%; padding:2px 6px; font-size:12px; display:none; position:absolute; top:-5px; right:-10px;">0</span>
            </div>

            <div class="help-icon" onclick="window.location.href='help.html'" style="cursor: pointer; color: white; font-size: 22px; margin-left: 15px; display: flex; align-items: center;" title="Help Center">
                 <i class="fas fa-headset"></i>
            </div>
        </div>
    </header>

    <div class="container" id="product-container">
        <p style="text-align:center; margin-top:50px;">Loading products...</p>
    </div>

    <script>
        // 1. Main Search Function
        function mainSearch() {
            const val = document.getElementById('mainSearchInput').value;
            if(val) {
                window.location.href = `category.html?search=${val}`;
            }
        }

        async function loadProducts() {
            try {
                const response = await fetch('products.json');
                const products = await response.json();
                const container = document.getElementById('product-container');
                container.innerHTML = ''; 


                const categories = {};
                products.forEach(product => {
                    if (!categories[product.category]) {
                        categories[product.category] = [];
                    }
                    categories[product.category].push(product);
                });

           
                for (const [categoryName, items] of Object.entries(categories)) {
                    
                    const previewItems = items.slice(0, 2); 
                    const displayCategory = categoryName.charAt(0).toUpperCase() + categoryName.slice(1);

                    let categoryHTML = `
                        <div class="category-section">
                            <div class="section-header">
                                <h2>${displayCategory}</h2>
                                <a href="category.html?cat=${categoryName}" class="view-all">View All ></a>
                            </div>
                            <div class="product-grid">
                    `;

                    previewItems.forEach(product => {
    categoryHTML += ` 
      <div class="product-card" onclick="window.location.href='category.html?cat=${categoryName}'">
        <img src="${product.image}" alt="${product.name}">
        <div class="card-details">
            <div class="p-name">${product.name}</div>
            <div class="p-price">Rs. ${product.price}</div>
            <button class="buy-btn">Buy Now</button>
        </div>
      </div>
    `; 
});


                    categoryHTML += `</div></div>`; 
                    container.innerHTML += categoryHTML;
                }

            } catch (error) {
                console.error('Error:', error);
            }
        }
        loadProducts();
    </script>
    <script src="cart.js"></script>
</body>
</html>
