<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Center | Add Product</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>

    

    <div id="toast-container"></div>

    <div class="container">
        <div class="header">

            
            <div style="background: #f0f0f0; padding: 20px; border-radius: 8px; margin-bottom: 30px; border: 1px solid #ddd;">
                 <h3>Manage Categories</h3>
                <div style="display: flex; gap: 10px;">
                <input type="text" id="new-cat-input" placeholder="New Category Name (e.g. Laptops)" style="flex:1; padding: 10px;">
                <button onclick="addNewCategory()" style="padding: 10px 20px; background: #333; color: white; border: none; cursor: pointer;">+ Add Category</button>
                </div>
            </div>


            <h2>Add New Product</h2>
            <p>Manage your inventory easily</p>
        </div>

        <form id="productForm">
            <div class="form-group">
                <label>Product Name</label>
                <input type="text" id="name" placeholder="Ex: Wireless Bluetooth Headphones" required>
            </div>

            <div class="form-group">
                 <label>Category</label>
                 <select id="category" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
                         <option value="">Select a Category...</option>
                </select>
            </div>

            <div class="form-group">
                <label>Price (LKR)</label>
                <input type="number" id="price" placeholder="Ex: 2500" required>
            </div>

            <div class="form-group">
                 <label>Shipping Fee (LKR)</label>
                 <input type="number" id="shipping" placeholder="Ex: 350" required>
            </div>

            <div class="form-group">
                 <label>Stock Quantity</label>
                 <input type="number" id="stock" placeholder="Ex: 10" required>
            </div>
       
            <div class="form-group">
                <label>Product Image</label>
                <div class="file-upload-wrapper">
                    <i class="fas fa-cloud-upload-alt fa-2x"></i>
                    <span id="file-name">Click or Drag to Upload Image</span>
                    <input type="file" id="image" accept="image/*" required>
                </div>
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea id="description" rows="3" placeholder="Enter product specifications..."></textarea>
            </div>

            <button type="submit" class="submit-btn">Publish Product</button>
        </form>
    </div>

    
    
    
    <script>
        // --- 1. Categories ---
        document.addEventListener('DOMContentLoaded', () => {
            loadCategories();
        });

        async function loadCategories() {
            try {
                // Server එකෙන් කැටගරි ඉල්ලනවා
                const response = await fetch('http://localhost:3000/categories');
                const categories = await response.json();
                
                const selectBox = document.getElementById('category');
                

                selectBox.innerHTML = '<option value="">Select a Category...</option>';

      
                categories.forEach(cat => {
                    const option = document.createElement('option');
                    option.value = cat;
                    option.innerText = cat;
                    selectBox.appendChild(option);
                });
            } catch (err) {
                console.error("Error loading categories", err);
            }
        }

        // --- 2. new Category  ---
        async function addNewCategory() {
            const input = document.getElementById('new-cat-input');
            const categoryName = input.value.trim();

            if (!categoryName) return alert("Please enter a category name!");

            try {
                const response = await fetch('http://localhost:3000/add-category', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ newCategory: categoryName })
                });

                const result = await response.json();
                
                if (response.ok) {
                    showNotification("Category Added Successfully!", 'success');
                    input.value = ''; // Input null
                    loadCategories(); 
                } else {
                    alert(result.message || "Error adding category");
                }
            } catch (err) {
                console.error("Error:", err);
            }
        }

        document.getElementById('image').addEventListener('change', function(){
            const fileName = this.files[0] ? this.files[0].name : "Click or Drag to Upload Image";
            document.getElementById('file-name').innerText = fileName;
            document.getElementById('file-name').style.color = "#f85606";
        });

        // --- 4. Notification Function ---
        function showNotification(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const icon = type === 'success' ? '<i class="fas fa-check-circle" style="color:#10b981"></i>' : '<i class="fas fa-exclamation-circle" style="color:#ef4444"></i>';

            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <div class="toast-icon">${icon}</div>
                <div class="toast-message">${message}</div>
            `;

            container.appendChild(toast);

            setTimeout(() => {
                toast.style.animation = "fadeOut 0.5s forwards";
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }

        // ---  Product Submit ---
        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const btn = document.querySelector('.submit-btn');
            const originalText = btn.innerText;
            btn.innerText = "Publishing...";
            btn.disabled = true;
            btn.style.opacity = "0.7";

            const formData = new FormData();
            formData.append('name', document.getElementById('name').value);
            formData.append('category', document.getElementById('category').value);
            formData.append('price', document.getElementById('price').value);
            formData.append('shipping', document.getElementById('shipping').value);
            formData.append('stock', document.getElementById('stock').value); // Stock එක
            formData.append('description', document.getElementById('description').value);
            formData.append('image', document.getElementById('image').files[0]);

            try {
                const response = await fetch('http://localhost:3000/add-product', {
                    method: 'POST',
                    body: formData
                });

                if(response.ok) {
                    showNotification('Product Added Successfully!', 'success');
                    document.getElementById('productForm').reset();
                    document.getElementById('file-name').innerText = "Click or Drag to Upload Image";
                    document.getElementById('file-name').style.color = "#6b7280";
                } else {
                    throw new Error('Upload failed');
                }
            } catch (error) {
                showNotification('Something went wrong!', 'error');
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
                btn.style.opacity = "1";
            }
        });


    </script>
</body>
</html>
